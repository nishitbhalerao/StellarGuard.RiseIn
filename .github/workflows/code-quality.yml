name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Linting and Formatting
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run ESLint (Frontend)
      run: |
        npx eslint src/ --ext .js,.jsx,.ts,.tsx --format=json --output-file=eslint-frontend.json || true
        npx eslint src/ --ext .js,.jsx,.ts,.tsx
      continue-on-error: true
      
    - name: Run ESLint (Backend)
      run: |
        cd backend
        npm ci
        npx eslint . --ext .js --format=json --output-file=../eslint-backend.json || true
        npx eslint . --ext .js
      continue-on-error: true
      
    - name: Run Prettier Check
      run: |
        npx prettier --check "src/**/*.{js,jsx,ts,tsx,json,css,md}"
        cd backend && npx prettier --check "**/*.{js,json,md}"
      continue-on-error: true
      
    - name: Upload lint results
      uses: actions/upload-artifact@v4
      with:
        name: lint-results
        path: |
          eslint-frontend.json
          eslint-backend.json
        retention-days: 7

  # Type Checking
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run TypeScript Check (if applicable)
      run: |
        if [ -f "tsconfig.json" ]; then
          npx tsc --noEmit
        else
          echo "No TypeScript configuration found, skipping type check"
        fi
      continue-on-error: true

  # Dependency Audit
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        
    - name: Audit Frontend Dependencies
      run: |
        npm ci
        npm audit --audit-level=moderate --json > frontend-audit.json || true
        npm audit --audit-level=moderate
      continue-on-error: true
      
    - name: Audit Backend Dependencies
      run: |
        cd backend
        npm ci
        npm audit --audit-level=moderate --json > ../backend-audit.json || true
        npm audit --audit-level=moderate
      continue-on-error: true
      
    - name: Check for outdated packages
      run: |
        echo "Frontend outdated packages:"
        npm outdated || true
        echo "Backend outdated packages:"
        cd backend && npm outdated || true
      continue-on-error: true
      
    - name: Upload audit results
      uses: actions/upload-artifact@v4
      with:
        name: dependency-audit
        path: |
          frontend-audit.json
          backend-audit.json
        retention-days: 7

  # Bundle Analysis
  bundle-analysis:
    name: Bundle Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build and analyze bundle
      run: |
        npm run build
        npx vite-bundle-analyzer dist --json > bundle-analysis.json || true
      continue-on-error: true
      
    - name: Check bundle size
      run: |
        echo "Bundle size analysis:"
        du -sh dist/
        find dist/ -name "*.js" -exec ls -lh {} \; | head -10
      
    - name: Upload bundle analysis
      uses: actions/upload-artifact@v4
      with:
        name: bundle-analysis
        path: |
          bundle-analysis.json
          dist/
        retention-days: 7

  # Code Coverage
  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run tests with coverage
      run: |
        npm test -- --coverage --watchAll=false --coverageReporters=lcov,json,text
      continue-on-error: true
      
    - name: Run backend tests with coverage
      run: |
        cd backend
        npm ci
        npm test -- --coverage --watchAll=false --coverageReporters=lcov,json,text
      continue-on-error: true
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage/lcov.info,./backend/coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        
    - name: Coverage Summary
      run: |
        echo "Frontend Coverage Summary:"
        cat coverage/coverage-summary.json || echo "No frontend coverage found"
        echo "Backend Coverage Summary:"
        cat backend/coverage/coverage-summary.json || echo "No backend coverage found"