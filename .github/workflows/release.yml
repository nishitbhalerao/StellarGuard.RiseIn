name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # Create Release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build frontend
      run: npm run build
      
    - name: Build backend
      run: |
        cd backend
        npm ci
        
    - name: Generate changelog
      id: changelog
      run: |
        # Get the tag name
        TAG_NAME=${GITHUB_REF#refs/tags/}
        echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
        
        # Generate changelog from commits
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -z "$PREVIOUS_TAG" ]; then
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
        else
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges $PREVIOUS_TAG..HEAD)
        fi
        
        # Save changelog to file
        echo "## What's Changed" > CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "$CHANGELOG" >> CHANGELOG.md
        echo "" >> CHANGELOG.md
        echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...$TAG_NAME" >> CHANGELOG.md
        
    - name: Create release archive
      run: |
        # Create frontend build archive
        cd dist
        tar -czf ../stellarguard-frontend-${{ steps.changelog.outputs.tag_name }}.tar.gz .
        cd ..
        
        # Create backend archive
        cd backend
        tar --exclude=node_modules --exclude=.env -czf ../stellarguard-backend-${{ steps.changelog.outputs.tag_name }}.tar.gz .
        cd ..
        
        # Create source archive
        tar --exclude=node_modules --exclude=dist --exclude=.git -czf stellarguard-source-${{ steps.changelog.outputs.tag_name }}.tar.gz .
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.changelog.outputs.tag_name }}
        name: StellarGuard ${{ steps.changelog.outputs.tag_name }}
        body_path: CHANGELOG.md
        draft: false
        prerelease: false
        files: |
          stellarguard-frontend-${{ steps.changelog.outputs.tag_name }}.tar.gz
          stellarguard-backend-${{ steps.changelog.outputs.tag_name }}.tar.gz
          stellarguard-source-${{ steps.changelog.outputs.tag_name }}.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Deploy Release to Production
  deploy-release:
    name: Deploy Release
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        
    - name: Install Vercel CLI
      run: npm install --global vercel@latest
      
    - name: Pull Vercel Environment Information
      run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      
    - name: Build Project Artifacts
      run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      
    - name: Deploy Project Artifacts to Vercel
      run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
      
    - name: Assign Production Domain
      run: vercel alias --token=${{ secrets.VERCEL_TOKEN }}

  # Notify Release
  notify-release:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [create-release, deploy-release]
    if: always()
    
    steps:
    - name: Get release info
      id: release
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
        
    - name: Notify Success
      if: needs.create-release.result == 'success' && needs.deploy-release.result == 'success'
      run: |
        echo "🎉 Release ${{ steps.release.outputs.tag_name }} created and deployed successfully!"
        echo "📦 Release: https://github.com/${{ github.repository }}/releases/tag/${{ steps.release.outputs.tag_name }}"
        echo "🌐 Live: https://stellar-guard-rise-in.vercel.app/"
        
    - name: Notify Failure
      if: needs.create-release.result == 'failure' || needs.deploy-release.result == 'failure'
      run: |
        echo "❌ Release ${{ steps.release.outputs.tag_name }} failed!"
        echo "Create Release: ${{ needs.create-release.result }}"
        echo "Deploy Release: ${{ needs.deploy-release.result }}"